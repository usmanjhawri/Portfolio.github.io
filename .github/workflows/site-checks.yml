name: Site checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Check static files
        run: |
          test -f index.html
          test -f netlify.toml
          grep -q "Project portfolio" index.html
          grep -q "publish = \".\"" netlify.toml
